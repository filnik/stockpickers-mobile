# Regenerate the Xcode project after editing this file:
#     cd iosApp && xcodegen generate
#
# The .xcodeproj is a build artifact of this file — prefer editing project.yml
# over the generated pbxproj, which is not tracked in git.
name: iosApp

options:
  bundleIdPrefix: app.stockpickers.kmp
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "26.0"

targets:
  iosApp:
    type: application
    platform: iOS
    sources:
      - path: iosApp
    info:
      path: iosApp/Info.plist
      properties:
        CFBundleDisplayName: Stockpickers
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        # Required by Compose Multiplatform: without it, ComposeUIViewController's
        # PlistSanityCheck throws at startup. Uncaps the frame rate on ProMotion
        # (120 Hz) devices, which Compose renders at.
        CADisableMinimumFrameDurationOnPhone: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # Supabase is HTTPS-only; no ATS exception is needed.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.stockpickers.kmp.ios
        SWIFT_VERSION: "5.0"
        # The Kotlin framework is emitted here by embedAndSignAppleFrameworkForXcode.
        FRAMEWORK_SEARCH_PATHS:
          - $(inherited)
          - $(SRCROOT)/../shared/build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)
        # Shared.framework is a *static* framework (isStatic = true in
        # shared/build.gradle.kts): it is linked into the executable, not embedded.
        OTHER_LDFLAGS:
          - $(inherited)
          - -framework
          - Shared
        # The Gradle build phase writes into the source tree, which the default
        # script sandbox forbids.
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        # Simulator-only builds: no signing identity/team required.
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
    preBuildScripts:
      - name: Compile Kotlin Framework
        basedOnDependencyAnalysis: false
        script: |
          cd "$SRCROOT/.."
          ./gradlew :shared:embedAndSignAppleFrameworkForXcode
